<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- head outline/globe -->
  <circle cx="50" cy="52" r="39" stroke="#f5f3ef" stroke-width="3" stroke-linecap="round"/>

  <!-- eyebrows & ear tufts (filled with black to mask the circle stroke underneath) -->
  <path d="M 26 22 C 26 22 28 32 37 40 C 45 44 48 40 50 38 C 52 40 55 44 63 40 C 72 32 74 22 74 22 C 74 22 70 34 50 44 C 30 34 26 22 26 22 Z" fill="#0e0e0e" stroke="#f5f3ef" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- glasses bridge & frames -->
  <!-- Left frame -->
  <circle cx="36" cy="48" r="13" stroke="#f5f3ef" stroke-width="3"/>
  <!-- Right frame -->
  <circle cx="64" cy="48" r="13" stroke="#f5f3ef" stroke-width="3"/>
  <!-- Bridge -->
  <path d="M 49 48 L 51 48" stroke="#f5f3ef" stroke-width="3"/>
  <!-- Glasses temple/arms -->
  <path d="M 23 48 L 16 48 L 16 40" stroke="#f5f3ef" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 77 48 L 84 48 L 84 40" stroke="#f5f3ef" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left eye aperture lines -->
  <path d="M 36 38 L 41 45 M 42.5 44 L 38 52 M 39 53 L 30 51 M 31 50 L 29 42 M 30 41 L 38 41" stroke="#f5f3ef" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Right eye aperture lines -->
  <path d="M 64 38 L 69 45 M 70.5 44 L 66 52 M 67 53 L 58 51 M 59 50 L 57 42 M 58 41 L 66 41" stroke="#f5f3ef" stroke-width="2.2" stroke-linecap="round"/>

  <!-- beak -->
  <polygon points="50,49 46,55 54,55" fill="#d24e1a"/>

  <!-- lower feathers lines -->
  <path d="M 20 58 C 24 72 35 78 50 86 C 65 78 76 72 80 58" stroke="#f5f3ef" stroke-width="3" stroke-linecap="round"/>
  <path d="M 27 68 C 32 78 40 82 50 90 C 60 82 68 78 73 68" stroke="#f5f3ef" stroke-width="3" stroke-linecap="round"/>
</svg>
